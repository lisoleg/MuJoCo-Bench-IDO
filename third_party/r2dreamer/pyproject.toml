[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "r2dreamer"
version = "0.1.0"
description = "R2-Dreamer: Redundancy-Reduced World Models without Decoders or Augmentation"
requires-python = ">=3.11,<3.12"
dependencies = [
    "torch==2.8.0",
    "torchrl==0.9.2",
    "tensordict==0.9.1",
    "ruamel.yaml==0.17.4",
    "moviepy==1.0.3",
    "einops==0.3.0",
    "numpy==1.26.0",
    "hydra-core==1.3.2",
    "gymnasium==1.2.0",
    "tensorboard>=2.20,<3",
    "setuptools==77.0.3",
]

[project.optional-dependencies]
dmc = ["dm_control==1.0.28", "mujoco==3.3.0"]
atari = ["ale_py==0.11.2", "opencv-python==4.7.0.72"]
crafter = ["crafter==1.8.0"]
metaworld = ["metaworld==3.0.0", "mujoco==3.3.0"]
memorymaze = ["memory_maze==1.0.3", "mujoco==3.3.0", "dm_control==1.0.28", "gym==0.26.2"]
isaaclab = ["isaaclab[isaacsim,all]==2.3.2"]
all = ["r2dreamer[dmc,atari,crafter,metaworld,memorymaze,isaaclab]"]

[dependency-groups]
dev = ["pre-commit>=4"]

[tool.setuptools.packages.find]
include = ["envs*", "optim*"]

[tool.uv]
# Always applied globally (uv has no per-extra scoping), but only has
# practical effect when the isaaclab extra pulls in isaacsim-core, which
# hard-pins torch==2.7.0, packaging==23.0, and pywin32 unconditionally.
override-dependencies = [
    "packaging>=25.0,<26.0",
    "torch==2.8.0",
    "pywin32==306; sys_platform == 'win32'",
]
